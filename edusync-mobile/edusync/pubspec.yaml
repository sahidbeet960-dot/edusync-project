name: edusync
description: "EduSync - Smart Campus Learning Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.0

  # Routing
  go_router: ^14.2.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.4

  # WebSockets
  web_socket_channel: ^3.0.1

  # UI & Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.19.0
  file_picker: ^8.0.3
  url_launcher: ^6.3.2
  image_picker: ^1.0.7
  flutter_markdown: ^0.7.7+1
  animated_bottom_navigation_bar: ^1.4.0
  lottie: ^3.3.2
  syncfusion_flutter_pdfviewer: ^32.2.8
  http: ^1.6.0
  webview_flutter: ^4.4.2
  path_provider: ^2.1.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/